[package]
name = "elide-core"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
arc-swap       = "1"
blake3         = "1"
crossbeam-channel = "0.5"
log            = "0.4"
ed25519-dalek  = { version = "2", features = ["rand_core"] }
nix            = { version = "0.29", features = ["fs", "hostname", "process", "signal"] }
rand_core      = { version = "0.6", features = ["getrandom"] }
ulid           = "1"
zstd           = "0.13"

[dev-dependencies]
proptest = "1"
tempfile = "3"
