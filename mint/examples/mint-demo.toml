# Minimal demo config (docs/design-mint.md § "Reference client & demo").
#
# Two roles — `read` / `write` over a single {{request.prefix}} — just
# enough to exercise the issuance path end-to-end. This is NOT the Elide
# role inventory (see mint-elide.toml for that); it exists only for the
# bootstrap → enroll → approve → exchange → assume-role walkthrough.
# Each role's policy template lives under roles_dir (examples/demo_roles/).
#
# The macaroon root key is generated on first start at
# <data_dir>/root_key (64 hex chars, mode 0600). The Tigris admin
# credential comes
# from the AWS_* environment
# (the demo runs on the admin VM). Until the live Tigris SigV4 minter
# lands, `serve` wires the FAKE minter and warns loudly — assume-role
# returns a deterministic placeholder keypair.

audience = "mint"
# data_dir defaults to mint_data, roles_dir to mint_roles, each resolved
# against the working directory (not this file's parent); an absolute
# path is used verbatim. roles_dir is set so the demo runs from mint/:
roles_dir = "examples/demo_roles"
# data_dir = "mint_data"
# Each role's template defaults to <roles_dir>/<name>.json (read ->
# examples/demo_roles/read.json); set policy_file only to override.

# Listener transport (docs/design-mint.md § "Transport"). Default is
# TCP 127.0.0.1:8085 — the reference client reaches it with
# `--url http://127.0.0.1:8085`. For the bundled single-host dev shape
# (coordinator + mint co-resident) select the UDS transport instead;
# `socket = ""` binds <data_dir>/mint.sock, and the client targets it
# with `--url unix:mint_data/mint.sock`. bind and socket are mutually
# exclusive.
# socket = ""

[tenant]
bucket = "mint-demo"

[[role]]
name = "read"
required_caveats = ["sub", "aud", "exp"]
min_ttl_seconds = 60
max_ttl_seconds = 3600
default_ttl_seconds = 900

[[role]]
name = "write"
required_caveats = ["sub", "aud", "exp"]
min_ttl_seconds = 60
max_ttl_seconds = 900
default_ttl_seconds = 300
