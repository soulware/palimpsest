\* TLC model configuration for GCCheckpointOrdering.tla
\*
\* Run with:
\*   tlc specs/GCCheckpointOrdering.tla -config specs/GCCheckpointOrdering.cfg
\*
\* Or with the VS Code TLA+ extension (tlaplus.tlaplus):
\*   Cmd+Shift+P → "TLA+: Check Model"
\*
\* The state space is tiny (< 20 reachable states).  TLC finishes instantly.
\*
\* Expected output: all three invariants hold in all reachable states.
\*
\* To observe the bug: change GcCheckpoint in the .tla file to set
\*   u_flush' = wal_open_ulid    (flush WAL under its original open ULID)
\* instead of minting a fresh ULID.  TLC will find a counterexample to
\* WalFlushAboveRepack and RebuildProducesCorrectLba showing the path:
\*   OpenWal → WriteToWal → GcCheckpoint → Crash → Rebuild
\* where lba0 = "old" despite wal_has_write = TRUE.

SPECIFICATION Spec

INVARIANTS
  TypeOK
  UlidMonotonicity
  WalFlushAboveRepack
  RebuildProducesCorrectLba

\* "rebuilt" is a terminal phase; no further actions are enabled.
\* Suppress the deadlock report since this is intentional.
CHECK_DEADLOCK FALSE
