\* TLC model configuration for HandoffProtocol.tla
\*
\* Run with:
\*   tlc specs/HandoffProtocol.tla -config specs/HandoffProtocol.cfg
\*
\* Or with the VS Code TLA+ extension (tlaplus.tlaplus):
\*   Cmd+Shift+P → "TLA+: Check Model"
\*
\* With two carried and one removed hash, TLC explores the state space in
\* seconds. The numbers below balance thoroughness with speed.

SPECIFICATION Spec

\* The terminal state (handoff = "cleaned", crashes_remaining = 0, all hashes
\* in "new"/"gone") has no enabled action. TLC reports that as a deadlock by
\* default; disable the check because the absence of an enabled action here
\* is the goal, not a bug.
CHECK_DEADLOCK FALSE

CONSTANTS
  \* Two hashes being moved to GCOutput, one being removed from the index.
  \* Using model values (distinct atoms) — TLC treats them as opaque IDs.
  Carried = {c1, c2}
  Removed = {r1}
  \* FALSE = normal repack/remove handoff; TRUE = tombstone (all-dead) handoff.
  \* Set to FALSE here; use HandoffProtocol_Tombstone.cfg to model-check the
  \* tombstone case (Carried={}, Removed={}, Dead=TRUE).
  Dead = FALSE
  \* Bound on the total number of CoordCrash + VolumeCrash events. The state
  \* graph stays small (~3x base) and TLC explores all crash interleavings up
  \* to this bound. Crashes are disabled at zero, so the system enters a
  \* quiescent phase where SF on the progress actions guarantees liveness.
  \* See the comment on CONSTANT MaxCrashes in HandoffProtocol.tla.
  MaxCrashes = 3

INVARIANTS
  TypeOK
  NoSegmentNotFound
  NoLostData
  OldOnlyDeletedAfterApplied
  OldIdxOnlyPresentWhenSegmentPresent
  CacheOnlyAfterUpload

PROPERTIES
  EventuallyDone
