\* TLC model configuration for HandoffProtocol.tla — tombstone (all-dead) case.
\*
\* Models a handoff where the coordinator determined all entries in the old
\* segment are dead. Under the self-describing protocol the coordinator still
\* writes a real GC output — a zero-entry segment with a non-empty inputs list.
\* The volume acknowledges by committing the bare body; promote_segment
\* recognises the zero-entry shape and skips writing the new idx/cache, only
\* deleting the input idx files.
\*
\* Run with:
\*   tlc specs/HandoffProtocol.tla -config specs/HandoffProtocol_Tombstone.cfg

SPECIFICATION Spec

CONSTANTS
  \* Tombstone: no hashes are carried or removed — the old segment is fully dead.
  Carried = {}
  Removed = {}
  Dead = TRUE

INVARIANTS
  TypeOK
  NoSegmentNotFound
  NoLostData
  OldOnlyDeletedAfterApplied
  OldIdxOnlyPresentWhenSegmentPresent
  CacheOnlyAfterUpload

PROPERTIES
  EventuallyDone
