name: ci-kernel

# "Lane C" — kernel-feature integration tests that need ublk_drv / nbd.
# GitHub's hosted runners deny modprobe for arbitrary modules on the host
# kernel, so we boot a nested KVM VM with an Ubuntu 24.04 cloud image and
# run the kernel-dependent tests inside the guest.
#
# Compilation happens on the *host* runner (fast CPUs, simple caching via
# Swatinem/rust-cache). The guest only ever runs the pre-built test binaries,
# reading them from the workspace via a 9p share. Host and guest are both
# Ubuntu 24.04, so binaries are ABI-compatible.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-kernel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kernel-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Host — verify KVM + record kernel
        run: |
          echo "host kernel: $(uname -r)"
          ls -la /dev/kvm
          grep -cE 'vmx|svm' /proc/cpuinfo || true

      - name: Host — install qemu + cloud tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils openssh-client

      - name: Host — rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-build

      - name: Host — build elide test binaries
        id: build-tests
        run: |
          echo "::group::cargo test --no-run"
          # --tests compiles the lib-test binary (hosts `nbd::` and `ublk::`
          # unit tests) AND the integration tests under `tests/` (e.g.
          # `ublk_crash`, `coordinator_nbd`). As a side-effect cargo
          # also builds the `elide` bin, because the integration tests
          # reference it via CARGO_BIN_EXE_elide.
          #
          # `-p elide-coordinator` additionally builds the coordinator
          # bin, which `coordinator_nbd` launches as a subprocess.
          cargo test --no-run -p elide -p elide-coordinator --tests --features ublk --message-format=json \
            | tee build-output.json \
            | jq -r 'select(.reason == "compiler-message") | .message.rendered // empty'
          echo "::endgroup::"

          LIB_BIN=$(jq -r 'select(.reason == "compiler-artifact" and .profile.test == true and .target.name == "elide" and (.target.kind | index("lib"))) | .executable' build-output.json | head -1)
          CRASH_BIN=$(jq -r 'select(.reason == "compiler-artifact" and .profile.test == true and .target.name == "ublk_crash") | .executable' build-output.json | head -1)
          COORD_NBD_BIN=$(jq -r 'select(.reason == "compiler-artifact" and .profile.test == true and .target.name == "coordinator_nbd") | .executable' build-output.json | head -1)
          COORD_UBLK_BIN=$(jq -r 'select(.reason == "compiler-artifact" and .profile.test == true and .target.name == "coordinator_ublk") | .executable' build-output.json | head -1)
          ELIDE_BIN=$(jq -r 'select(.reason == "compiler-artifact" and .profile.test == false and .target.name == "elide" and (.target.kind | index("bin"))) | .executable' build-output.json | head -1)
          ELIDE_COORD_BIN=$(jq -r 'select(.reason == "compiler-artifact" and .profile.test == false and .target.name == "elide-coordinator" and (.target.kind | index("bin"))) | .executable' build-output.json | head -1)

          for pair in "LIB_BIN=$LIB_BIN" "CRASH_BIN=$CRASH_BIN" "COORD_NBD_BIN=$COORD_NBD_BIN" "COORD_UBLK_BIN=$COORD_UBLK_BIN" "ELIDE_BIN=$ELIDE_BIN" "ELIDE_COORD_BIN=$ELIDE_COORD_BIN"; do
            path="${pair#*=}"
            if [ -z "$path" ] || [ ! -x "$path" ]; then
              echo "missing artifact: $pair"
              jq -r 'select(.reason == "compiler-artifact") | {kind: .target.kind, name: .target.name, test: .profile.test, exe: .executable}' build-output.json
              exit 1
            fi
          done

          echo "host lib:         $LIB_BIN"
          echo "host crash:       $CRASH_BIN"
          echo "host coord-nbd:   $COORD_NBD_BIN"
          echo "host coord-ublk:  $COORD_UBLK_BIN"
          echo "host elide:       $ELIDE_BIN"
          echo "host coordinator: $ELIDE_COORD_BIN"
          ls -lh "$LIB_BIN" "$CRASH_BIN" "$COORD_NBD_BIN" "$COORD_UBLK_BIN" "$ELIDE_BIN" "$ELIDE_COORD_BIN"

          echo "lib_bin=$LIB_BIN" >> "$GITHUB_OUTPUT"
          echo "crash_bin=$CRASH_BIN" >> "$GITHUB_OUTPUT"
          echo "coord_nbd_bin=$COORD_NBD_BIN" >> "$GITHUB_OUTPUT"
          echo "coord_ublk_bin=$COORD_UBLK_BIN" >> "$GITHUB_OUTPUT"
          echo "elide_bin=$ELIDE_BIN" >> "$GITHUB_OUTPUT"
          echo "elide_coord_bin=$ELIDE_COORD_BIN" >> "$GITHUB_OUTPUT"

      - name: Host — cache Ubuntu cloud image
        id: img-cache
        uses: actions/cache@v5
        with:
          path: base.img
          key: ubuntu-cloudimg-noble-current-v1

      - name: Host — fetch Ubuntu 24.04 cloud image
        if: steps.img-cache.outputs.cache-hit != 'true'
        run: |
          echo "::group::download"
          time wget -q \
            https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img \
            -O base.img
          ls -lh base.img
          echo "::endgroup::"

      - name: Host — build qcow2 overlay
        run: qemu-img create -f qcow2 -F qcow2 -b "$PWD/base.img" vm.qcow2 40G

      - name: Host — prepare SSH key + cloud-init seed
        run: |
          ssh-keygen -t ed25519 -N '' -f id_vm -q
          cat > user-data <<EOF
          #cloud-config
          users:
            - name: ci
              sudo: ALL=(ALL) NOPASSWD:ALL
              shell: /bin/bash
              ssh_authorized_keys:
                - $(cat id_vm.pub)
          package_update: true
          packages:
            - nbd-client
          EOF
          cat > meta-data <<EOF
          instance-id: ci-vm
          local-hostname: ci-vm
          EOF
          cloud-localds seed.img user-data meta-data

      - name: Host — boot guest VM (KVM, virtio, 9p repo share)
        run: |
          echo "::group::qemu boot"
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -smp 4 \
            -m 4096 \
            -display none \
            -serial file:qemu-serial.log \
            -drive file=vm.qcow2,if=virtio,format=qcow2 \
            -drive file=seed.img,if=virtio,format=raw \
            -netdev user,id=n0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=n0 \
            -fsdev local,path=${{ github.workspace }},security_model=mapped-xattr,id=repo \
            -device virtio-9p-pci,fsdev=repo,mount_tag=repo \
            -daemonize \
            -pidfile qemu.pid
          echo "qemu pid: $(cat qemu.pid)"
          echo "::endgroup::"

      - name: Host — wait for SSH + cloud-init
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 -i id_vm -p 2222"
          echo "::group::ssh wait"
          for i in $(seq 1 120); do
            if ssh $SSH_OPTS ci@localhost 'true' 2>/dev/null; then
              echo "ssh up after ~${i}*5s"
              break
            fi
            sleep 5
          done
          ssh $SSH_OPTS ci@localhost 'true' || { echo "ssh never came up"; tail -200 qemu-serial.log; exit 1; }
          echo "::endgroup::"

          echo "::group::cloud-init wait"
          ssh $SSH_OPTS ci@localhost 'sudo cloud-init status --wait || true'
          echo "::endgroup::"

      - name: Guest — install kernel modules-extra
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i id_vm -p 2222"
          SSH="ssh $SSH_OPTS ci@localhost"
          echo "::group::apt install linux-modules-extra"
          $SSH 'sudo apt-get update -qq'
          $SSH 'sudo DEBIAN_FRONTEND=noninteractive apt-get install -y linux-modules-extra-$(uname -r)'
          echo "::endgroup::"

      - name: Guest — kernel surface smoke test
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i id_vm -p 2222"
          SSH="ssh $SSH_OPTS ci@localhost"
          $SSH 'uname -r'
          $SSH 'sudo modprobe ublk_drv && ls -la /dev/ublk-control'
          $SSH 'sudo modprobe nbd && ls -la /dev/nbd0'
          $SSH 'lsmod | grep -E "ublk|^nbd"'

      - name: Guest — mount repo (9p)
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i id_vm -p 2222"
          SSH="ssh $SSH_OPTS ci@localhost"
          $SSH 'sudo mkdir -p /repo && sudo mount -t 9p -o trans=virtio,version=9p2000.L,msize=1048576 repo /repo'
          $SSH 'ls /repo | head'

      - name: Guest — run kernel-lane tests
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i id_vm -p 2222"
          SSH="ssh $SSH_OPTS ci@localhost"
          WS="${{ github.workspace }}"

          LIB_HOST="${{ steps.build-tests.outputs.lib_bin }}"
          CRASH_HOST="${{ steps.build-tests.outputs.crash_bin }}"
          COORD_NBD_HOST="${{ steps.build-tests.outputs.coord_nbd_bin }}"
          COORD_UBLK_HOST="${{ steps.build-tests.outputs.coord_ublk_bin }}"
          ELIDE_HOST="${{ steps.build-tests.outputs.elide_bin }}"
          ELIDE_COORD_HOST="${{ steps.build-tests.outputs.elide_coord_bin }}"
          LIB_GUEST="/repo${LIB_HOST#$WS}"
          CRASH_GUEST="/repo${CRASH_HOST#$WS}"
          COORD_NBD_GUEST="/repo${COORD_NBD_HOST#$WS}"
          COORD_UBLK_GUEST="/repo${COORD_UBLK_HOST#$WS}"
          ELIDE_GUEST="/repo${ELIDE_HOST#$WS}"
          ELIDE_COORD_GUEST="/repo${ELIDE_COORD_HOST#$WS}"

          echo "host lib:         $LIB_HOST         -> $LIB_GUEST"
          echo "host crash:       $CRASH_HOST       -> $CRASH_GUEST"
          echo "host coord-nbd:   $COORD_NBD_HOST   -> $COORD_NBD_GUEST"
          echo "host coord-ublk:  $COORD_UBLK_HOST  -> $COORD_UBLK_GUEST"
          echo "host elide:       $ELIDE_HOST       -> $ELIDE_GUEST"
          echo "host coordinator: $ELIDE_COORD_HOST -> $ELIDE_COORD_GUEST"
          for p in "$LIB_GUEST" "$CRASH_GUEST" "$COORD_NBD_GUEST" "$COORD_UBLK_GUEST" "$ELIDE_GUEST" "$ELIDE_COORD_GUEST"; do
            $SSH "test -x $p" || { echo "binary not accessible in guest: $p"; exit 1; }
          done

          echo "::group::nbd tests"
          time $SSH "$LIB_GUEST nbd:: --nocapture"
          echo "::endgroup::"
          echo "::group::ublk unit tests"
          time $SSH "$LIB_GUEST ublk:: --nocapture"
          echo "::endgroup::"
          # coordinator_nbd spawns `elide-coordinator serve` and the
          # `elide` CLI; both must be findable via env overrides. No
          # kernel modules or root required (unix sockets only).
          echo "::group::coordinator integration (nbd)"
          time $SSH "env ELIDE_BIN=$ELIDE_GUEST ELIDE_COORDINATOR_BIN=$ELIDE_COORD_GUEST $COORD_NBD_GUEST --nocapture"
          echo "::endgroup::"
          # Crash-injection tests spawn the `elide` binary, open /dev/ublk-control
          # and /dev/ublkbN, so they need root. `sudo env VAR=... cmd` reliably
          # passes the env var through regardless of sudoers env_keep policy.
          echo "::group::ublk crash-injection tests"
          time $SSH "sudo env ELIDE_BIN=$ELIDE_GUEST $CRASH_GUEST --nocapture"
          echo "::endgroup::"
          # coordinator_ublk drives a real /dev/ublkbN through the
          # coordinator's supervisor, so it needs root too. Both the
          # `elide` and `elide-coordinator` binaries are spawned as
          # subprocesses.
          echo "::group::coordinator integration (ublk)"
          time $SSH "sudo env ELIDE_BIN=$ELIDE_GUEST ELIDE_COORDINATOR_BIN=$ELIDE_COORD_GUEST $COORD_UBLK_GUEST --nocapture"
          echo "::endgroup::"

      - name: Artifacts — prepare qemu serial log
        if: always()
        run: sudo chown "$USER:" qemu-serial.log || true

      - name: Artifacts — qemu serial log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-serial-log
          path: qemu-serial.log
          if-no-files-found: ignore

      - name: Host — shutdown VM
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=5 -i id_vm -p 2222 ci@localhost \
              'sudo poweroff' || true
          sleep 5
          sudo kill "$(cat qemu.pid)" 2>/dev/null || true
