name: ci-kernel (prototype)

# Prototype of "Lane C" — kernel-feature integration tests that need ublk_drv
# / nbd. GitHub's hosted runners deny modprobe for arbitrary modules on the
# host kernel, so we boot a nested KVM VM with an Ubuntu 24.04 cloud image
# and run the kernel-dependent tests inside the guest.
#
# Compilation happens on the *host* runner (fast CPUs, simple caching via
# Swatinem/rust-cache). The guest only ever runs the pre-built test binaries,
# reading them from the workspace via a 9p share. Host and guest are both
# Ubuntu 24.04, so binaries are ABI-compatible.
#
# Status: prototype. Triggered manually or by applying the `ci:kernel` label.

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

jobs:
  kernel-tests:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'ci:kernel')
      || (github.event_name == 'pull_request' && github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'ci:kernel'))
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Host — verify KVM + record kernel
        run: |
          echo "host kernel: $(uname -r)"
          ls -la /dev/kvm
          grep -cE 'vmx|svm' /proc/cpuinfo || true

      - name: Host — install qemu + cloud tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils openssh-client

      - name: Host — rust cache
        uses: Swatinem/rust-cache@v2

      - name: Host — build elide test binary
        id: build-tests
        run: |
          echo "::group::cargo test --no-run"
          cargo test --no-run -p elide --lib --features ublk --message-format=json \
            | tee build-output.json \
            | jq -r 'select(.reason == "compiler-message") | .message.rendered // empty'
          echo "::endgroup::"
          TEST_BIN=$(jq -r 'select(.reason == "compiler-artifact" and .profile.test == true and .target.name == "elide" and (.target.kind | index("lib"))) | .executable' build-output.json | head -1)
          if [ -z "$TEST_BIN" ] || [ ! -x "$TEST_BIN" ]; then
            echo "could not locate elide test binary"
            jq -r 'select(.reason == "compiler-artifact" and .profile.test == true) | {kind: .target.kind, name: .target.name, exe: .executable}' build-output.json
            exit 1
          fi
          echo "host path: $TEST_BIN"
          ls -lh "$TEST_BIN"
          echo "test_bin=$TEST_BIN" >> "$GITHUB_OUTPUT"

      - name: Host — cache Ubuntu cloud image
        id: img-cache
        uses: actions/cache@v5
        with:
          path: base.img
          key: ubuntu-cloudimg-noble-current-v1

      - name: Host — fetch Ubuntu 24.04 cloud image
        if: steps.img-cache.outputs.cache-hit != 'true'
        run: |
          echo "::group::download"
          time wget -q \
            https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img \
            -O base.img
          ls -lh base.img
          echo "::endgroup::"

      - name: Host — build qcow2 overlay
        run: qemu-img create -f qcow2 -F qcow2 -b "$PWD/base.img" vm.qcow2 40G

      - name: Host — prepare SSH key + cloud-init seed
        run: |
          ssh-keygen -t ed25519 -N '' -f id_vm -q
          cat > user-data <<EOF
          #cloud-config
          users:
            - name: ci
              sudo: ALL=(ALL) NOPASSWD:ALL
              shell: /bin/bash
              ssh_authorized_keys:
                - $(cat id_vm.pub)
          package_update: true
          packages:
            - nbd-client
          EOF
          cat > meta-data <<EOF
          instance-id: ci-vm
          local-hostname: ci-vm
          EOF
          cloud-localds seed.img user-data meta-data

      - name: Host — boot guest VM (KVM, virtio, 9p repo share)
        run: |
          echo "::group::qemu boot"
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -smp 4 \
            -m 4096 \
            -display none \
            -serial file:qemu-serial.log \
            -drive file=vm.qcow2,if=virtio,format=qcow2 \
            -drive file=seed.img,if=virtio,format=raw \
            -netdev user,id=n0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=n0 \
            -fsdev local,path=${{ github.workspace }},security_model=mapped-xattr,id=repo \
            -device virtio-9p-pci,fsdev=repo,mount_tag=repo \
            -daemonize \
            -pidfile qemu.pid
          echo "qemu pid: $(cat qemu.pid)"
          echo "::endgroup::"

      - name: Host — wait for SSH + cloud-init
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 -i id_vm -p 2222"
          echo "::group::ssh wait"
          for i in $(seq 1 120); do
            if ssh $SSH_OPTS ci@localhost 'true' 2>/dev/null; then
              echo "ssh up after ~${i}*5s"
              break
            fi
            sleep 5
          done
          ssh $SSH_OPTS ci@localhost 'true' || { echo "ssh never came up"; tail -200 qemu-serial.log; exit 1; }
          echo "::endgroup::"

          echo "::group::cloud-init wait"
          ssh $SSH_OPTS ci@localhost 'sudo cloud-init status --wait || true'
          echo "::endgroup::"

      - name: Guest — install kernel modules-extra
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i id_vm -p 2222"
          SSH="ssh $SSH_OPTS ci@localhost"
          echo "::group::apt install linux-modules-extra"
          $SSH 'sudo apt-get update -qq'
          $SSH 'sudo DEBIAN_FRONTEND=noninteractive apt-get install -y linux-modules-extra-$(uname -r)'
          echo "::endgroup::"

      - name: Guest — kernel surface smoke test
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i id_vm -p 2222"
          SSH="ssh $SSH_OPTS ci@localhost"
          $SSH 'uname -r'
          $SSH 'sudo modprobe ublk_drv && ls -la /dev/ublk-control'
          $SSH 'sudo modprobe nbd && ls -la /dev/nbd0'
          $SSH 'lsmod | grep -E "ublk|^nbd"'

      - name: Guest — mount repo (9p)
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i id_vm -p 2222"
          SSH="ssh $SSH_OPTS ci@localhost"
          $SSH 'sudo mkdir -p /repo && sudo mount -t 9p -o trans=virtio,version=9p2000.L,msize=1048576 repo /repo'
          $SSH 'ls /repo | head'

      - name: Guest — run kernel-lane tests
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i id_vm -p 2222"
          SSH="ssh $SSH_OPTS ci@localhost"
          HOST_BIN="${{ steps.build-tests.outputs.test_bin }}"
          GUEST_BIN="/repo${HOST_BIN#${{ github.workspace }}}"
          echo "host path:  $HOST_BIN"
          echo "guest path: $GUEST_BIN"
          $SSH "test -x $GUEST_BIN" || { echo "test binary not accessible in guest"; exit 1; }
          echo "::group::nbd tests"
          time $SSH "$GUEST_BIN nbd:: --nocapture"
          echo "::endgroup::"
          echo "::group::ublk tests"
          time $SSH "$GUEST_BIN ublk:: --nocapture" || true
          echo "::endgroup::"

      - name: Artifacts — prepare qemu serial log
        if: always()
        run: sudo chown "$USER:" qemu-serial.log || true

      - name: Artifacts — qemu serial log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qemu-serial-log
          path: qemu-serial.log
          if-no-files-found: ignore

      - name: Host — shutdown VM
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=5 -i id_vm -p 2222 ci@localhost \
              'sudo poweroff' || true
          sleep 5
          sudo kill "$(cat qemu.pid)" 2>/dev/null || true
