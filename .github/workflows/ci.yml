name: ci

# Host-runner CI. Two parallel jobs:
#   - host-tests: fmt, clippy, and the workspace test suite (skipping the
#     kernel-feature modules that run in ci-kernel.yml).
#   - host-proptests: the feature-gated proptest suites, which take
#     noticeably longer. Split so the faster job signals green quickly.
#
# Both jobs share a Swatinem rust-cache via `shared-key: rust-build`, so
# cold PR runs restore from the main-branch build cache.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-build

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: "cargo test --workspace --no-fail-fast -- --skip nbd:: --skip ublk::"

  host-proptests:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-build

      - name: cargo test (proptest)
        run: "cargo test --workspace --features proptest --tests --no-fail-fast"

      - name: Upload proptest regressions
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: proptest-regressions
          path: "**/proptest-regressions/**"
          if-no-files-found: ignore
