  # Ubuntu 24.04 LTS dev VM for elide kernel-lane work
  images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"

  cpus: 4
  memory: "4GiB"
  disk: "40GiB"

  vmType: "vz"
  vmOpts:
    vz:
      rosetta:
        enabled: false
        binfmt: false

  mounts: []
  mountType: "virtiofs"

  provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      apt-get update
      apt-get install -y linux-modules-extra-$(uname -r)
      # load now
      modprobe ublk_drv
      # load on every boot
      cat >/etc/modules-load.d/elide.conf <<EOF
      ublk_drv
      EOF

  probes:
  - description: "ublk module loaded"
    script: |
      #!/bin/bash
      set -eux
      lsmod | grep -q '^ublk_drv ' || exit 1
    hint: "module failed to load — check 'limactl shell elide-dev sudo dmesg'"

